services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      # Give the backend access to the Docker daemon so executor.py can
      # spin up sibling sandbox containers with `docker run`.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - python-sandbox-builder
      - java-sandbox-builder

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  # These services exist only to ensure the sandbox images are built
  # before the backend starts. They exit immediately after starting.
  python-sandbox-builder:
    build:
      context: ./docker
      dockerfile: Dockerfile.python
    image: python-sandbox
    entrypoint: ["true"]

  java-sandbox-builder:
    build:
      context: ./docker
      dockerfile: Dockerfile.java
    image: java-sandbox
    entrypoint: ["true"]
